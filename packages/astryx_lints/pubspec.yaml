name: astryx_lints
description: custom_lint rules that enforce Astryx conventions (Material-free imports, token usage over raw colors).
version: 0.0.1
publish_to: none

# Standalone (NOT a pub-workspace member): custom_lint pins its own analyzer
# version, so keeping it out of the shared workspace resolution avoids conflicts.
environment:
  sdk: ^3.11.0

dependencies:
  analyzer: ">=6.0.0 <11.0.0"
  custom_lint_builder: ^0.7.0

dev_dependencies:
  lints: ^4.0.0
